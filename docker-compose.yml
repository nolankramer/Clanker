# Clanker — assumes Home Assistant and Frigate are already running separately.
# This compose file only runs the Clanker service itself.

services:
  clanker:
    build: .
    container_name: clanker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config:/app/config:ro
      - clanker-data:/app/data
    # Use host network to reach HA and Ollama on the same machine.
    # Switch to bridge + explicit ports if you prefer isolation.
    network_mode: host
    # Healthcheck: verify the process is alive
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  clanker-data:
    driver: local
