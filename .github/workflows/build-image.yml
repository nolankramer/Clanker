name: Build OS Images

on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-utils qemu-user-static binfmt-support parted

      - name: Build image (${{ matrix.arch }})
        run: sudo bash image/build-image.sh --arch ${{ matrix.arch }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: clanker-${{ matrix.arch }}
          path: image/output/*.img.gz

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: image/output/*.img.gz
