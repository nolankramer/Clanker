name: "Clanker"
description: "LLM-powered smart home assistant — voice control, camera vision, proactive automations"
version: "0.1.1"
slug: "clanker"
url: "https://github.com/nolankramer/clanker"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto

# Networking
ports:
  8472/tcp: 8472
ports_description:
  8472/tcp: "Conversation API"

# Ingress — web UI accessible from HA sidebar
ingress: true
ingress_port: 8471
panel_icon: "mdi:robot"
panel_title: "Clanker"

# HA integration — gives us SUPERVISOR_TOKEN and API access
homeassistant_api: true
auth_api: true

# Map HA config dir so we can install the custom component
map:
  - config:rw
  - share:rw

# User-configurable options (shown in HA add-on settings UI)
options:
  anthropic_api_key: ""
  openai_api_key: ""
  ollama_url: "http://localhost:11434"
  ollama_model: "llama3.2"
  default_provider: "anthropic"
  vision_provider: "anthropic"
  tts_engine: "tts.piper"
  frigate_enabled: false
  frigate_url: "http://localhost:5000"
  log_level: "INFO"

schema:
  anthropic_api_key: "str?"
  openai_api_key: "str?"
  ollama_url: "url"
  ollama_model: "str"
  default_provider: "list(anthropic|ollama|openai)"
  vision_provider: "list(anthropic|ollama|openai)"
  tts_engine: "str"
  frigate_enabled: "bool"
  frigate_url: "url?"
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
