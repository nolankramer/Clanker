name: "Clanker"
description: "LLM-powered smart home assistant — voice control, camera vision, proactive automations"
version: "0.1.1"
slug: "clanker"
url: "https://github.com/nolankramer/clanker"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto

# Networking
ports:
  8472/tcp: 8472
ports_description:
  8472/tcp: "Conversation API"

# Ingress — setup wizard accessible from HA sidebar
ingress: true
ingress_port: 8471
panel_icon: "mdi:robot"
panel_title: "Clanker"

# HA integration — gives us SUPERVISOR_TOKEN and API access
homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: true

# Map HA config dir so we can install the custom component
map:
  - config:rw
  - share:rw

# User-configurable options (shown in HA add-on settings UI)
options:
  "Install Ollama add-on": false
  "Install voice add-ons (Whisper, Piper, Wake Word)": false
  anthropic_api_key: ""
  openai_api_key: ""
  ollama_url: ""
  ollama_model: "llama3.2"
  default_provider: "ollama"
  tts_engine: "tts.piper"
  log_level: "INFO"

schema:
  "Install Ollama add-on": "bool"
  "Install voice add-ons (Whisper, Piper, Wake Word)": "bool"
  anthropic_api_key: "str?"
  openai_api_key: "str?"
  ollama_url: "str?"
  ollama_model: "str"
  default_provider: "list(anthropic|ollama|openai)"
  tts_engine: "str"
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
